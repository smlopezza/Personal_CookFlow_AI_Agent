<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookFlow — Your Weekly Plan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .hero { background: #198754; color: white; padding: 1.5rem 1rem; text-align: center; }
    .hero h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    /* Plan content styles */
    .plan-content h1,
    .plan-content h2,
    .plan-content h3 { color: #198754; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .plan-content h3 { font-size: 1.1rem; border-bottom: 2px solid #d1e7dd; padding-bottom: 0.25rem; }
    .plan-content p { margin-bottom: 0.6rem; line-height: 1.7; }
    .plan-content ul, .plan-content ol { padding-left: 1.4rem; margin-bottom: 0.75rem; }
    .plan-content li { margin-bottom: 0.3rem; line-height: 1.6; }
    .plan-content strong { color: #155724; }

    /* Table styling */
    .plan-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0 1rem;
      font-size: 0.9rem;
    }
    .plan-content th {
      background: #198754;
      color: white;
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-weight: 600;
    }
    .plan-content td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid #dee2e6;
    }
    .plan-content tr:nth-child(even) td { background: #f0faf4; }

    .btn-outline-success { color: #198754; border-color: #198754; }
    .btn-outline-success:hover { background: #198754; color: white; }

    /* Loading state */
    .loading-indicator { text-align: center; padding: 2rem 0; color: #6c757d; }
    .loading-indicator .spinner-border { width: 2rem; height: 2rem; color: #198754; }

    @media print {
      .no-print { display: none; }
      body { background: white; }
      .hero { background: #198754 !important; -webkit-print-color-adjust: exact; }
      .plan-content th { background: #198754 !important; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>🍳 Your Weekly Plan</h1>
</div>

<div class="container py-4" style="max-width: 640px;">

  <div class="card p-4 mb-3">
    {% if loading %}
    <!-- Streaming: content populated progressively by SSE -->
    <div class="loading-indicator" id="loadingIndicator">
      <div class="spinner-border mb-2"></div>
      <p class="small mb-0">Building your weekly plan... This may take a few minutes...</p>
    </div>
    <div class="plan-content" id="planContent" style="display:none;"></div>

    {% else %}
    <!-- Non-streaming fallback -->
    <div class="plan-content">{{ plan | safe }}</div>
    {% endif %}
  </div>

  <!-- Action buttons — hidden until streaming completes -->
  <div class="row g-2 no-print mb-4" id="actionButtons" {% if loading %}style="display:none;"{% endif %}>
    <div class="col-6">
      <a href="/" class="btn btn-outline-success w-100">← Plan again</a>
    </div>
    <div class="col-6">
      <button onclick="window.print()" class="btn btn-outline-secondary w-100">🖨️ Print / Save PDF</button>
    </div>
  </div>

</div>

<script>
  {% if loading %}
  function reportLatency(flow) {
      const t0 = parseInt(sessionStorage.getItem('ux_t0') || '0');
      if (!t0) return;                                                          
      sessionStorage.removeItem('ux_t0');                                       
      fetch('/log/latency', {                                                   
        method: 'POST',                                                         
        headers: { 'Content-Type': 'application/json' },                        
        body: JSON.stringify({ flow: flow, latency_ms: Date.now() - t0 })
      }).catch(() => {});                                                       
    }    

  // ── SSE streaming ──────────────────────────────────────────────────────────
  const streamUrl = "{{ stream_url }}";
  const planDiv = document.getElementById("planContent");
  const loadingDiv = document.getElementById("loadingIndicator");
  const actionButtons = document.getElementById("actionButtons");

  let accumulated = "";
  const source = new EventSource(streamUrl);

  source.onmessage = function(e) {
    if (e.data === "[DONE]") {
      source.close();
      planDiv.innerHTML = marked.parse(accumulated);
      loadingDiv.style.display = "none";
      planDiv.style.display = "block";
      actionButtons.style.display = "flex";
      reportLatency('plan');
      return;
    }

    try {
      const chunk = JSON.parse(e.data);
      accumulated += chunk;
      planDiv.innerHTML = marked.parse(accumulated);
      planDiv.style.display = "block";
      loadingDiv.style.display = "none";
    } catch(err) {
      console.error("SSE parse error:", err);
    }
  };

  source.onerror = function() {
    source.close();
    if (!accumulated) {
      loadingDiv.innerHTML = '<p class="text-danger">Something went wrong. <a href="/">Try again</a></p>';
    } else {
      actionButtons.style.display = "flex";
    }
  };
  {% endif %}
</script>

</body>
</html>
