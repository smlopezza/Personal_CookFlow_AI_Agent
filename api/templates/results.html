<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookFlow — Your Weekly Plan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .hero { background: #198754; color: white; padding: 1.5rem 1rem; text-align: center; }
    .hero h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .plan-content { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.7; }
    .btn-outline-success { color: #198754; border-color: #198754; }
    .btn-outline-success:hover { background: #198754; color: white; }
    @media print {
      .no-print { display: none; }
      body { background: white; }
      .hero { background: #198754 !important; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>🍳 Your Weekly Plan</h1>
</div>

<div class="container py-4" style="max-width: 640px;">

  <div class="card p-4 mb-3">
    <div class="plan-content">{{ plan }}</div>
  </div>

  <div class="row g-2 no-print mb-4">
    <div class="col-6">
      <a href="/" class="btn btn-outline-success w-100">← Plan again</a>
    </div>
    <div class="col-6">
      <button onclick="window.print()" class="btn btn-outline-secondary w-100">🖨️ Print / Save PDF</button>
    </div>
  </div>

  <!-- Email form (Phase 3 — SendGrid) -->
  <div class="card p-4 no-print">
    <h6 class="fw-semibold mb-2">📧 Email this plan to yourself</h6>
    <form action="/email" method="post">
      <input type="hidden" name="plan" value="{{ plan }}">
      <div class="input-group">
        <input type="email" class="form-control" name="email"
               placeholder="your@email.com" required>
        <button type="submit" class="btn btn-success">Send</button>
      </div>
    </form>
  </div>

</div>

</body>
</html>
