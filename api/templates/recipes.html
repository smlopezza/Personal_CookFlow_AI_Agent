<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookFlow — Choose Your Recipes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .hero { background: #198754; color: white; padding: 1.5rem 1rem; text-align: center; }
    .hero h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .agent-response { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; }
    .btn-success { background: #198754; border-color: #198754; }
  </style>
</head>
<body>

<div class="hero">
  <h1>🍳 CookFlow</h1>
</div>

<div class="container py-4" style="max-width: 640px;">

  <div class="card p-4 mb-3">
    <h5 class="fw-semibold mb-3">Here are your recipe options</h5>
    <div class="agent-response">{{ agent_response }}</div>
  </div>

  <div class="card p-4">
    <form action="/confirm" method="post" id="confirmForm">
      <input type="hidden" name="session_id" value="{{ session_id }}">
      <input type="hidden" name="form_data" value="{{ form_data }}">

      <label for="selection" class="form-label fw-semibold">
        Which recipe would you like? (or ask for a swap)
      </label>
      <input type="text" class="form-control mb-3" name="selection" id="selection"
             placeholder="e.g. Option 1, or Swap option 2 for something quicker"
             required autofocus>

      <button type="submit" class="btn btn-success w-100 py-2 fw-semibold" id="submitBtn">
        Build My Plan →
      </button>
    </form>
  </div>

  <div class="text-center mt-3">
    <a href="/" class="text-muted small">← Start over</a>
  </div>

</div>

<script>
  document.getElementById('confirmForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Building your plan...';
  });
</script>

</body>
</html>
