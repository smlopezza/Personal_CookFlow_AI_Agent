<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookFlow — Choose Your Recipes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .hero { background: #198754; color: white; padding: 1.5rem 1rem; text-align: center; }
    .hero h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-success { background: #198754; border-color: #198754; }
    .btn-outline-success { color: #198754; border-color: #198754; }
    .btn-outline-success:hover { background: #198754; color: white; }
    .divider { text-align: center; color: #adb5bd; font-size: 0.85rem; margin: 0.5rem 0; }

    /* Recipe options content */
    .agent-response h1,
    .agent-response h2,
    .agent-response h3 { color: #198754; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.4rem; }
    .agent-response h3 { font-size: 1.05rem; }
    .agent-response p { margin-bottom: 0.5rem; line-height: 1.7; }
    .agent-response ol, .agent-response ul { padding-left: 1.3rem; margin-bottom: 0.5rem; }
    .agent-response li { margin-bottom: 0.25rem; line-height: 1.6; }
    .agent-response strong { color: #155724; }
    .agent-response a { color: #198754; text-decoration: underline; word-break: break-all; }
    .agent-response a:hover { color: #146c43; }
    .agent-response table { width: 100%; border-collapse: collapse; margin: 0.5rem 0 0.75rem; font-size: 0.9rem; }
    .agent-response th { background: #198754; color: white; padding: 0.45rem 0.7rem; text-align: left; }
    .agent-response td { padding: 0.4rem 0.7rem; border-bottom: 1px solid #dee2e6; }
    .agent-response tr:nth-child(even) td { background: #f0faf4; }

    /* Loading state */
    .loading-indicator { text-align: center; padding: 2rem 0; color: #6c757d; }
    .loading-indicator .spinner-border { width: 2rem; height: 2rem; color: #198754; }
  </style>
</head>
<body>

<div class="hero">
  <h1>🍳 CookFlow</h1>
</div>

<div class="container py-4" style="max-width: 640px;">

  <!-- Recipe options -->
  <div class="card p-4 mb-3">
    <h5 class="fw-semibold mb-3">Here are your recipe options</h5>

    {% if loading %}
    <!-- Streaming: content populated progressively by SSE -->
    <div class="loading-indicator" id="loadingIndicator">
      <div class="spinner-border mb-2"></div>
      <p class="small mb-0">Finding the best recipes for you...</p>
    </div>
    <div class="agent-response" id="agentResponse" style="display:none;"></div>

    {% else %}
    <!-- Non-streaming fallback (e.g. server-rendered swap) -->
    <div class="agent-response">{{ agent_response | safe }}</div>
    {% endif %}
  </div>

  <!-- Action buttons — hidden until streaming completes -->
  <div id="actionButtons" {% if loading %}style="display:none;"{% endif %}>

    {% if mode == "ingredient" %}

    <!-- Mode A: user must pick one recipe -->
    <div class="card p-4">
      <label class="form-label fw-semibold">Which recipe would you like?</label>
      <form action="/confirm" method="post" id="confirmForm">
        <input type="hidden" name="session_id" value="{{ session_id }}">
        <input type="text" class="form-control mb-3" name="selection"
               placeholder="e.g. Option 1, or Option 2"
               required autofocus>
        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold" id="confirmBtn">
          Build my plan →
        </button>
      </form>
    </div>

    <div class="divider">— or —</div>

    <div class="card p-4">
      <label class="form-label fw-semibold">Want to swap something?</label>
      <form action="/swap" method="post" id="swapForm">
        <input type="hidden" name="session_id" value="{{ session_id }}">
        <input type="hidden" name="mode" value="ingredient">
        <input type="text" class="form-control mb-3" name="swap_request"
               placeholder="e.g. Something vegetarian instead"
               required>
        <button type="submit" class="btn btn-outline-success w-100" id="swapBtn">
          Update recipes
        </button>
      </form>
    </div>

    {% else %}

    <!-- Mode B: confirm all 4 or swap -->
    <div class="card p-4 mb-2">
      <p class="text-muted small mb-2">Happy with these options?</p>
      <form action="/confirm" method="post" id="confirmForm">
        <input type="hidden" name="session_id" value="{{ session_id }}">
        <input type="hidden" name="selection"
               value="These look great. Please proceed and build the full meal plan.">
        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold" id="confirmBtn">
          Build my plan →
        </button>
      </form>
    </div>

    <div class="divider">— or —</div>

    <div class="card p-4">
      <label class="form-label fw-semibold">Want to change or swap something?</label>
      <form action="/swap" method="post" id="swapForm">
        <input type="hidden" name="session_id" value="{{ session_id }}">
        <input type="hidden" name="mode" value="weekly">
        <input type="text" class="form-control mb-3" name="swap_request"
               placeholder="e.g. Swap option 2 for something quicker, or make it vegetarian"
               required>
        <button type="submit" class="btn btn-outline-success w-100" id="swapBtn">
          Update recipes
        </button>
      </form>
    </div>

    {% endif %}

  </div><!-- /actionButtons -->

  <div class="text-center mt-3">
    <a href="/" class="text-muted small">← Start over</a>
  </div>

</div>

<script>
  {% if loading %}
  // ── SSE streaming ──────────────────────────────────────────────────────────
  const streamUrl = "{{ stream_url }}";
  const responseDiv = document.getElementById("agentResponse");
  const loadingDiv = document.getElementById("loadingIndicator");
  const actionButtons = document.getElementById("actionButtons");

  let accumulated = "";
  const source = new EventSource(streamUrl);

  source.onmessage = function(e) {
    if (e.data === "[DONE]") {
      source.close();
      // Final render with full accumulated text
      responseDiv.innerHTML = marked.parse(accumulated);
      // Make all links open in new tab
      responseDiv.querySelectorAll("a").forEach(a => {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });
      loadingDiv.style.display = "none";
      responseDiv.style.display = "block";
      actionButtons.style.display = "block";
      return;
    }

    try {
      const chunk = JSON.parse(e.data);
      accumulated += chunk;
      // Progressive render during streaming
      responseDiv.innerHTML = marked.parse(accumulated);
      responseDiv.style.display = "block";
      loadingDiv.style.display = "none";
    } catch(err) {
      console.error("SSE parse error:", err);
    }
  };

  source.onerror = function() {
    source.close();
    if (!accumulated) {
      loadingDiv.innerHTML = '<p class="text-danger">Something went wrong. <a href="/">Try again</a></p>';
    } else {
      actionButtons.style.display = "block";
    }
  };
  {% endif %}

  // ── Form submission spinners ───────────────────────────────────────────────
  const confirmForm = document.getElementById("confirmForm");
  if (confirmForm) {
    confirmForm.addEventListener("submit", function() {
      const btn = document.getElementById("confirmBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Building your plan...';
    });
  }

  const swapForm = document.getElementById("swapForm");
  if (swapForm) {
    swapForm.addEventListener("submit", function() {
      const btn = document.getElementById("swapBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Finding alternatives...';
    });
  }
</script>

</body>
</html>
