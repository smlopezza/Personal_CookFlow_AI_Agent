<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookFlow — Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; background: #f8f9fa; }
    .hero { background: #198754; color: white; padding: 1rem; text-align: center; }
    .hero h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .hero a { color: rgba(255,255,255,0.75); font-size: 0.8rem; text-decoration: none; }
    .hero a:hover { color: white; }

    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
      max-width: 640px;
      margin: 0 auto;
      padding: 0 0.75rem;
    }

    /* Message list */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.agent { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 0.6rem 0.9rem;
      border-radius: 16px;
      font-size: 0.93rem;
      line-height: 1.6;
    }
    .bubble.user {
      background: #198754;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.agent {
      background: white;
      color: #212529;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* Markdown inside agent bubble */
    .bubble.agent h1, .bubble.agent h2, .bubble.agent h3 {
      color: #198754; font-weight: 700;
      margin-top: 0.75rem; margin-bottom: 0.3rem;
    }
    .bubble.agent h3 { font-size: 1rem; border-bottom: 1px solid #d1e7dd; padding-bottom: 0.2rem; }
    .bubble.agent p { margin-bottom: 0.4rem; }
    .bubble.agent ul, .bubble.agent ol { padding-left: 1.2rem; margin-bottom: 0.4rem; }
    .bubble.agent li { margin-bottom: 0.2rem; }
    .bubble.agent strong { color: #155724; }
    .bubble.agent a { color: #198754; word-break: break-all; }
    .bubble.agent table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.88rem; }
    .bubble.agent th { background: #198754; color: white; padding: 0.35rem 0.6rem; text-align: left; }
    .bubble.agent td { padding: 0.3rem 0.6rem; border-bottom: 1px solid #dee2e6; }
    .bubble.agent tr:nth-child(even) td { background: #f0faf4; }

    /* Typing indicator */
    .typing .dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #adb5bd;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Input bar */
    .input-bar {
      padding: 0.75rem 0 1rem;
      background: #f8f9fa;
      border-top: 1px solid #dee2e6;
    }
    .input-bar .input-group { gap: 0.5rem; }
    .input-bar input {
      border-radius: 24px !important;
      padding: 0.55rem 1rem;
      border: 1px solid #ced4da;
    }
    .input-bar button {
      border-radius: 24px !important;
      padding: 0.55rem 1.2rem;
      background: #198754;
      border-color: #198754;
      white-space: nowrap;
    }
    .input-bar button:hover { background: #146c43; border-color: #146c43; }
  </style>
</head>
<body>

<div class="hero">
  <h1>🍳 CookFlow</h1>
  <a href="/">← Use the form instead</a>
</div>

<div class="chat-wrapper">

  <div class="messages" id="messages">

    {% if not history %}
    <!-- Welcome hint when no history yet -->
    <div class="msg-row agent">
      <div class="bubble agent">
        Hi! I'm CookFlow, your kitchen planning assistant. What's your name?
      </div>
    </div>
    {% endif %}

    {% for msg in history %}
      {% if msg.role == "user" %}
      <div class="msg-row user">
        <div class="bubble user">{{ msg.text }}</div>
      </div>
      {% else %}
      <div class="msg-row agent">
        <div class="bubble agent">{{ msg.html | safe }}</div>
      </div>
      {% endif %}
    {% endfor %}

    <!-- Typing indicator (hidden by default, shown on submit) -->
    <div class="msg-row agent" id="typing" style="display:none;">
      <div class="bubble agent typing">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

  </div>

  <div class="input-bar">
    <form action="/chat" method="post" id="chatForm">
      <input type="hidden" name="session_id" value="{{ session_id }}">
      <input type="hidden" name="history" value="{{ history_json | e }}">
      <div class="input-group">
        <input type="text" class="form-control" name="message"
               id="messageInput"
               placeholder="Type a message…" required autocomplete="off" autofocus>
        <button type="submit" class="btn btn-success" id="sendBtn">Send</button>
      </div>
    </form>
  </div>

</div>

<script>
  // Scroll to bottom on load
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;

  // Show typing indicator on send
  document.getElementById('chatForm').addEventListener('submit', function() {
    document.getElementById('typing').style.display = 'flex';
    document.getElementById('sendBtn').disabled = true;
    msgs.scrollTop = msgs.scrollHeight;
  });
</script>

</body>
</html>
